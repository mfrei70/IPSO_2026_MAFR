name: PDF Generierung
on: [push] # Auslöser bei jedem Commit
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Pandoc
        run: sudo apt-get install pandoc
      - name: Convert Markdown to PDF
        run: pandoc README.md -o document.pdf
      - name: Upload PDF
        uses: actions/upload-artifact@v3
        with:
          name: pdf-dokument
          path: document.pdf
